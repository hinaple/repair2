<!doctype html>
<html lang="en" spellcheck="false">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>REPAIR2 plugin dev page</title>
        <style>
            body {
                margin: 0;
                display: flex;
                height: 100vh;
                overflow: hidden;
                background: repeating-conic-gradient(#e7e7e7 0% 25%, #bababa 0% 50%) 50% / 16px 16px;
            }
            input[type="text"],
            input[type="number"],
            textarea {
                width: 100%;
                margin-bottom: 8px;
                padding: 6px 8px;
                border-radius: 4px;
                border: none;
                box-sizing: border-box;
                font-family: inherit;
            }
            textarea {
                resize: vertical;
            }
            button {
                width: 100%;
                background-color: #d3d3d3;
                padding-block: 8px;
                border-radius: 4px;
                border: none;
                font-size: 14px;
                cursor: pointer;
                font-weight: 600;
            }
            button:hover {
                background-color: #fff;
            }
            .panel-zone {
                position: fixed;
                top: 10px;
                right: 10px;
                width: 280px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .panel {
                background: rgba(0, 0, 0, 0.7);
                color: white;
                font-family: sans-serif;
                border-radius: 8px;
                max-height: 90vh;
                overflow: hidden;
                user-select: none;
                display: flex;
                flex-direction: column;
                z-index: 9999;
                backdrop-filter: blur(3px);
            }
            .panel.foldable {
                flex: 0 1 auto;

                .panel-header {
                    cursor: pointer;
                }
            }
            .panel-header {
                padding: 10px;
                background: rgba(255, 255, 255, 0.1);
                font-weight: bold;
            }
            .panel-content {
                padding: 10px;
                overflow-y: auto;
                flex: 1;
            }
            .panel-content label {
                display: block;
                font-size: 0.85em;
                margin-bottom: 4px;
            }
            #props-panel.collapsed #props-content {
                display: none;
            }

            #component-container {
                outline: dashed #000 2px;
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
            }
        </style>
    </head>
    <body>
        <div id="component-container"></div>
        <div class="panel-zone">
            <div id="props-panel" class="panel foldable">
                <div id="props-header" class="panel-header">Config</div>
                <div id="props-content" class="panel-content"></div>
            </div>
            <div class="panel">
                <div class="panel-header">Event Dispatcher</div>
                <div class="panel-content">
                    <input type="text" id="event-channel" placeholder="Channel" />
                    <textarea id="event-data" placeholder="Data"></textarea>
                    <button id="event-dispatch">Dispatch</button>
                </div>
            </div>
        </div>
        <script type="module" src="./devtool.js"></script>
    </body>
</html>
